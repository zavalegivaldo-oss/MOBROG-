<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamento Seguro</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: #f4f6f8; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      margin: 0; 
    }
    .box { 
      background: white; 
      padding: 30px; 
      border-radius: 12px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
      text-align: center; 
      max-width: 350px; 
      width: 100%; 
    }
    .btn { 
      background: #e21a22; 
      color: white; 
      border: none; 
      padding: 15px; 
      width: 100%; 
      font-size: 16px; 
      font-weight: bold; 
      border-radius: 6px; 
      cursor: pointer; 
      text-transform: uppercase; 
      margin-top: 20px; 
    }
  </style>
</head>
<body>

  <div class="box">
    <h2 style="margin:0; color:#333;">Finalizar Compra</h2>
    <p style="color:#666; font-size:14px;">O seu número fica oculto. Pague com total privacidade.</p>
    <div style="font-size: 32px; font-weight: bold; color: #222; margin: 15px 0;">100,00 MT</div>
    
    <!-- BOTÃO QUE ATIVA O TELEMÓVEL DO CLIENTE -->
    <button class="btn" onclick="pagarAgora()">⚡ Confirmar e Pagar</button>
  </div>

  <script>
    function pagarAgora() {
      // O seu número e o valor configurados de forma automática
      const meuNumeroMpesa = "847154707"; 
      const valor = "100";

      // 1. Abre a aplicação M-Pesa caso o cliente a tenha no telemóvel
      window.location.href = "mpesa://pay?merchant=" + meuNumeroMpesa + "&amount=" + valor;

      // 2. Abre o teclado de chamadas com o código USSD pré-digitado
      setTimeout(function() {
          window.location.href = "tel:*150*1*1*" + meuNumeroMpesa + "*" + valor + "%23";
      }, 400);
    }
  </script>

</body>
</html>
