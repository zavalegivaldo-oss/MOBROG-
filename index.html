<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout M-Pesa</title>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="box">

  <h1>Pagamento M-Pesa</h1>

  <input
    type="tel"
    id="numero"
    placeholder="84XXXXXXX"
    maxlength="9"
  >

  <button onclick="abrirModal()">
    Pagar Agora
  </button>

  <div id="status"></div>

</div>

<div id="modal" class="modal">

  <div class="modal-content">

    <h2>Confirme o pagamento</h2>

    <p>
      Aguarde enquanto conectamos ao M-Pesa.
    </p>

    <div id="contador">5</div>

  </div>

</div>

<script src="js/app.js"></script>

</body>
</html>
