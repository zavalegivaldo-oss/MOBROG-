<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MY MUZE VPN</title>
<style>
:root{--bg:#000;--card:#1A0A0A;--red:#E50914;--red-dark:#4A0E0E;--green:#10B981;--white:#FFF}
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--white);max-width:420px;margin:0 auto;height:100vh;display:flex;flex-direction:column}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#0D0D0D}
.logo-box{background:#000;padding:6px 10px;border-radius:4px;border-bottom:3px solid var(--red)}
.logo{font-size:24px;font-weight:900;letter-spacing:1px;line-height:1}
.logo .red-dot{color:var(--red);font-size:28px;line-height:0}
.logo-sub{font-size:9px;color:var(--white);margin-top:2px}
.menu{width:28px;display:flex;flex-direction:column;gap:4px;cursor:pointer}
.menu span{height:3px;background:var(--white);border-radius:2px}
.screen{flex:1;overflow-y:auto;padding:16px 16px 60px}
.top-select{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.select-card{background:var(--card);border-radius:14px;padding:12px 14px;border:1px solid var(--red-dark)}
.select-card label{font-size:11px;color:#B3B3B3;letter-spacing:1px;font-weight:700}
.select-card .val{font-size:16px;color:var(--red);font-weight:900;margin-top:4px}
.status{display:flex;align-items:center;justify-content:center;gap:8px;font-weight:900;font-size:14px;margin-bottom:16px}
.status-dot{width:12px;height:12px;border-radius:50%;background:#555}
.status.connected .status-dot{background:var(--green)}
.status.connecting .status-dot{background:var(--red);animation:blink 1s infinite}
@keyframes blink{50%{opacity:.3}}

.btn-wrap{width:200px;height:200px;margin:0 auto 24px;position:relative}
.btn-circle{width:200px;height:200px;border-radius:50%;position:absolute;top:0;left:0;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:var(--white);cursor:pointer;background:#1A1A1A;box-shadow:inset 0 0 0 8px #000}
.btn-circle::before{content:'';position:absolute;width:160px;height:160px;border-radius:50%;background:#000;z-index:1}
.btn-circle span{position:relative;z-index:2}
.progress{position:absolute;top:0;left:0;width:200px;height:200px;transform:rotate(-90deg);z-index:3;pointer-events:none}
.progress circle{fill:none;stroke-width:8;stroke-linecap:round}
.progress .bg{stroke:#1A1A1A}
.progress .bar{stroke:var(--red);stroke-dasharray:565;stroke-dashoffset:565;transition:stroke-dashoffset .1s linear}
.progress.connected .bar{stroke:var(--green)}

.stats-2{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;margin-bottom:16px}
.stat-box{background:var(--card);border:2px solid var(--red-dark);border-radius:14px;padding:16px;text-align:center}
.stat-box .arrow{font-size:24px;color:var(--red);line-height:1;margin-bottom:4px}
.stat-box.down .arrow{transform:rotate(180deg)}
.stat-box .val{font-size:32px;font-weight:900;line-height:1}
.stat-box .unit{font-size:12px;color:#B3B3B3;margin-left:2px}
.stat-box .lbl{font-size:11px;color:#B3B3B3;margin-top:4px;font-weight:700}
.refresh-btn{width:56px;height:56px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;cursor:pointer}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.card{background:var(--card);border-radius:14px;padding:14px;border:1px solid var(--red-dark)}
.card label{font-size:11px;color:#B3B3B3;font-weight:700;letter-spacing:.5px}
.card .val{font-size:20px;font-weight:900;margin-top:4px}
.banner{position:fixed;bottom:0;left:0;right:0;max-width:420px;margin:0 auto;background:var(--red);padding:14px;text-align:center;font-weight:900;font-size:12px;letter-spacing:1px}
</style>
</head>
<body>

<header>
  <div class="logo-box">
    <div class="logo">MY MU<span class="red-dot">Z</span>E</div>
    <div class="logo-sub">só na Vodacom</div>
  </div>
  <div class="menu"><span></span><span></span><span></span></div>
</header>

<div class="screen">
  <div class="top-select">
    <div class="select-card"><label>SERVICO</label><div class="val">Streaming</div></div>
    <div class="select-card"><label>PAIS</label><div class="val">Moçambique</div></div>
  </div>

  <div class="status" id="statusRow"><div class="status-dot"></div> DESCONECTADO</div>
  
  <div class="btn-wrap">
    <svg class="progress" id="progress">
      <circle class="bg" cx="100" cy="100" r="90"></circle>
      <circle class="bar" id="bar" cx="100" cy="100" r="90"></circle>
    </svg>
    <div class="btn-circle" id="btnCircle" onclick="toggle()"><span id="btnTxt">CONECTAR</span></div>
  </div>

  <div class="stats-2">
    <div class="stat-box down">
      <div class="arrow">↓</div>
      <div><span class="val" id="downVal">0</span><span class="unit" id="downUnit">KB</span></div>
      <div class="lbl">DOWNLOAD</div>
    </div>
    <div class="refresh-btn" onclick="reset()">↻</div>
    <div class="stat-box up">
      <div class="arrow">↑</div>
      <div><span class="val" id="upVal">0</span><span class="unit" id="upUnit">KB</span></div>
      <div class="lbl">UPLOAD</div>
    </div>
  </div>

  <div class="grid-2">
    <div class="card"><label>TEMPO</label><div class="val" id="tempo">00:00:00</div></div>
    <div class="card"><label>PING</label><div class="val" id="ping">-- ms</div></div>
  </div>
  <div class="grid-2">
    <div class="card"><label>IP ATUAL</label><div class="val" id="ip">192.168.1.1</div></div>
    <div class="card"><label>IP VPN</label><div class="val" id="ipvpn">--.--</div></div>
  </div>
</div>

<div class="banner">PLANO PRO • MENSAL • ATIVADO</div>

<script>
const CIRC = 565; // 2*PI*90
let estado='desconectado'; // desconectado, conectando, conectado
let seg=0, downKB=0, upKB=0, loopT, connectT;

function toggle(){
  if(estado==='desconectado'){conectar()}
  else if(estado==='conectado'){desconectar()}
}

function conectar(){
  estado='conectando';
  document.getElementById('btnTxt').textContent='CONECTANDO';
  document.getElementById('statusRow').className='status connecting';
  document.getElementById('statusRow').innerHTML='<div class="status-dot"></div> CONECTANDO';
  
  let p=0;
  connectT=setInterval(()=>{
    p+=2; // 2% a cada 50ms = 2.5s pra conectar
    document.getElementById('bar').style.strokeDashoffset=CIRC-(CIRC*p/100);
    if(p>=100){
      clearInterval(connectT);
      estado='conectado';
      document.getElementById('progress').classList.add('connected');
      document.getElementById('btnCircle').style.background='conic-gradient(var(--green) 0deg 360deg)';
      document.getElementById('btnTxt').textContent='DESCONECTAR';
      document.getElementById('statusRow').className='status connected';
      document.getElementById('statusRow').innerHTML='<div class="status-dot"></div> CONECTADO';
      document.getElementById('ipvpn').textContent='185.76.43.12';
      document.getElementById('ping').textContent='12 ms';
      iniciarContadores();
    }
  },50);
}

function desconectar(){
  clearInterval(loopT);
  clearInterval(connectT);
  estado='desconectado';
  document.getElementById('progress').classList.remove('connected');
  document.getElementById('bar').style.strokeDashoffset=CIRC;
  document.getElementById('btnCircle').style.background='#1A1A1A';
  document.getElementById('btnTxt').textContent='CONECTAR';
  document.getElementById('statusRow').className='status';
  document.getElementById('statusRow').innerHTML='<div class="status-dot"></div> DESCONECTADO';
  document.getElementById('ipvpn').textContent='--.--';
  document.getElementById('ping').textContent='-- ms';
}

function formatKB(kb){
  if(kb>=1024){
    return [(kb/1024).toFixed(1),'MB']
  }
  return [Math.floor(kb),'KB']
}

function iniciarContadores(){
  loopT=setInterval(()=>{
    seg++;
    const h=String(Math.floor(seg/3600)).padStart(2,'0');
    const m=String(Math.floor(seg%3600/60)).padStart(2,'0');
    const s=String(seg%60).padStart(2,'0');
    document.getElementById('tempo').textContent=`${h}:${m}:${s}`;
    
    downKB+=Math.random()*150+50; // sobe mais rápido
    upKB+=Math.random()*30+10; // sobe 5x mais devagar
    
    const [dVal,dUnit]=formatKB(downKB);
    const [uVal,uUnit]=formatKB(upKB);
    document.getElementById('downVal').textContent=dVal;
    document.getElementById('downUnit').textContent=dUnit;
    document.getElementById('upVal').textContent=uVal;
    document.getElementById('upUnit').textContent=uUnit;
  },1000);
}

function reset(){
  seg=0;downKB=0;upKB=0;
  document.getElementById('tempo').textContent='00:00:00';
  document.getElementById('downVal').textContent='0';
  document.getElementById('downUnit').textContent='KB';
  document.getElementById('upVal').textContent='0';
  document.getElementById('upUnit').textContent='KB';
}
</script>
</body>
</html>
